name: CompatHelper
on:
  schedule:
    - cron: '00 00 * * *'
  workflow_dispatch:
jobs:
  CompatHelper:
    runs-on: ubuntu-latest
    steps:
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: Pkg.add("CompatHelper")
        run: |
          import Pkg
          Pkg.add("CompatHelper")
        shell: julia --color=yes {0}
      - name: CompatHelper.main()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPATHELPER_PRUNE_REGISTRIES: 'false'
        run: |
          import CompatHelper
          CompatHelper.main()
        shell: julia --color=yes {0}
